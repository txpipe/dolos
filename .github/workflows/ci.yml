name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # rustfmt.toml enables `wrap_comments`, an unstable option that only the
      # nightly rustfmt applies — stable silently ignores it. Run nightly here so
      # the check actually enforces comment wrapping. Local devs: `cargo +nightly fmt`.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  deny:
    name: cargo deny (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # Fails the build on any RustSec advisory affecting the locked
      # dependency tree. Config lives in deny.toml (advisories only). The
      # action installs cargo-deny and caches the advisory database.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.91
      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --all-targets

      - name: Run e2e smoke tests
        if: runner.os != 'Windows'
        run: cargo test --test smoke -- --ignored

      - name: Run e2e tests
        if: runner.os != 'Windows'
        run: cargo test --test sync --test snapshot -- --ignored
